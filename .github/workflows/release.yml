# Publishes a public container image to GitHub Container Registry (GHCR) so
# people can deploy ProxyCTL without building it themselves.
#
# Scaffold: enable by pushing this repo to GitHub and creating a tag:
#     git tag v0.0.1-beta && git push origin v0.0.1-beta
# The image lands at ghcr.io/<owner>/proxyctl:<tag> and :latest.
# (No secrets to configure — GITHUB_TOKEN is provided automatically; the
# package is public if the repo is public, or set it public once in the
# repo's Packages settings.)
#
# After the first publish, point deployments at it:
#   - k8s/proxyctl.yaml:  image: ghcr.io/<owner>/proxyctl:<tag>
#   - scripts/install.sh: PROXYCTL_IMAGE=ghcr.io/<owner>/proxyctl:<tag>
name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to publish (e.g. v0.0.1-beta)"
        required: true

permissions:
  contents: write   # also publish a GitHub Release for the tag
  packages: write

jobs:
  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve image ref (lowercase owner)
        id: ref
        run: |
          owner="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          tag="${GITHUB_REF_NAME}"
          [ "${{ github.event_name }}" = "workflow_dispatch" ] && tag="${{ github.event.inputs.tag }}"
          echo "image=ghcr.io/${owner}/proxyctl" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          build-args: |
            VERSION=${{ steps.ref.outputs.tag }}
          tags: |
            ${{ steps.ref.outputs.image }}:${{ steps.ref.outputs.tag }}
            ${{ steps.ref.outputs.image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Publish GitHub Release
        # So /releases/latest resolves and users get release notes.
        # Idempotent: edit if it already exists.
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.ref.outputs.tag }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --title "$TAG"
          else
            gh release create "$TAG" --title "$TAG" --generate-notes
          fi
